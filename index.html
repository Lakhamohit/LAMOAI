<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Core</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="main-container">


    <!-- AI SIDE -->

    <section class="ai-panel">

        <div class="core">

            <div class="orb">
                ●
            </div>

            <h1>AI CORE</h1>

            <p id="status">
                ● ONLINE
            </p>

        </div>


        <div id="answer-box">

            <div class="ai-message">
                Hello. I am ready.
            </div>

        </div>


    </section>




    <!-- USER SIDE -->

    <section class="user-panel">


        <h1>HUMAN INPUT</h1>


        <div id="question-box">

        </div>



        <div class="input-area">


            <textarea 
            id="user-input"
            placeholder="Ask something..."
            ></textarea>



            <button onclick="sendMessage()">
                SEND
            </button>


        </div>


    </section>


</div>
    

<script src="modules/conversation.js"></script>

<script src="modules/datetime.js"></script>

<script src="modules/calculator.js"></script>

<script src="modules/wiki.js"></script>

<script src="modules/memory.js"></script>

<script src="modules/facts.js"></script>


<script src="brain.js"></script>

<script src="app.js"></script>

    
    
</body>

</html>
